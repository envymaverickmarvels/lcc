apiVersion: apps/v1
kind: Deployment
metadata:
  name: localmed-web
  namespace: localmed
  labels:
    app: localmed-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: localmed-web
  template:
    metadata:
      labels:
        app: localmed-web
    spec:
      containers:
      - name: web
        image: localmed/web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.localmed.com"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: localmed-web
  namespace: localmed
spec:
  selector:
    app: localmed-web
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: localmed-api-hpa
  namespace: localmed
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: localmed-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
