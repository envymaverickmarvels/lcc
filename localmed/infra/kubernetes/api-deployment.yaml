apiVersion: apps/v1
kind: Deployment
metadata:
  name: localmed-api
  namespace: localmed
  labels:
    app: localmed-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: localmed-api
  template:
    metadata:
      labels:
        app: localmed-api
    spec:
      containers:
      - name: api
        image: localmed/api:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: localmed-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: localmed-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: localmed-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: localmed-api
  namespace: localmed
spec:
  selector:
    app: localmed-api
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
